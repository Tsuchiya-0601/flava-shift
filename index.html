<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帽子屋flavaシフト管理</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      box-sizing: border-box;
    }

    button {
      background: #00b894;
      color: white;
      border: none;
      border-radius: 5px;
    }

    #list div {
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }
  </style>
</head>
<body>

  <h1>帽子屋flavaシフト管理</h1>

  <div class="card">
    <h2>従業員登録</h2>
    <input id="name" placeholder="名前">
    <input id="email" placeholder="メール">
    <button onclick="addEmployee()">登録</button>
  </div>

  <div class="card">
    <h2>従業員一覧</h2>
    <div id="list">読み込み中...</div>
  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://njfczsystzfcqfcnmtkq.supabase.co",
      "sb_publishable_bLly_Xbs0DqycEmiUS259w_ZVS6EZUb"
    );

    async function addEmployee() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();

      if (!name || !email) {
        alert("名前とメールを入れてください");
        return;
      }

      const { error } = await supabaseClient
        .from("employees")
        .insert([{ name: name, email: email }]);

      if (error) {
        alert("登録失敗: " + error.message);
        return;
      }

      alert("登録成功！");
      document.getElementById("name").value = "";
      document.getElementById("email").value = "";
      loadEmployees();
    }

    async function loadEmployees() {
      const { data, error } = await supabaseClient
        .from("employees")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        document.getElementById("list").innerHTML = "読み込み失敗: " + error.message;
        return;
      }

      if (!data || data.length === 0) {
        document.getElementById("list").innerHTML = "まだ従業員がいません";
        return;
      }

      let html = "";
      data.forEach(e => {
        html += `<div>${e.name} (${e.email})</div>`;
      });

      document.getElementById("list").innerHTML = html;
    }

    loadEmployees();
  </script>

</body>
</html>
