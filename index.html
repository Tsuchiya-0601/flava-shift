function getSym(t) { return (SHIFT_DEF[t]&&SHIFT_DEF[t].symbol)||t; }
function getDim(y,m) { return new Date(y,m+1,0).getDate(); }
function getDayName(y,m,d) { return ["日","月","火","水","木","金","土"][new Date(y,m,d).getDay()]; }
function getIsWE(y,m,d) { return new Date(y,m,d).getDay()===0; }
function getIsToday(y,m,d) { return y===YEAR&&m===MONTH&&d===TODAY; }
function entryTime(e) { if(!e) return ""; if(typeof e==="string") return e; return e.time||""; }
function entryEdited(e) { return e&&e.edited; }
function entryLoc(e) { return e?e.loc:""; }
function pad2(n) { return String(n).padStart(2,"0"); }
function toHHMM(h,m) { if(m>=60){h+=Math.floor(m/60);m=m%60;} if(m<0){h-=1;m=60+m;} return pad2(h%24)+":"+pad2(m); }
function makeEntry(time,loc) { return {time:time,loc:loc||"",edited:false,editLog:[]}; }

function calcNet(a,b,c,d) {
  function p(t) { if(!t) return null; var s=t.split(":"); return parseInt(s[0])*60+parseInt(s[1]); }
  var i=p(a),o=p(b);
  if(i===null||o===null) return null;
  var w=o>=i?o-i:1440-i+o;
  var bs=p(c),be=p(d);
  if(bs!==null&&be!==null) w-=(be>=bs?be-bs:1440-bs+be);
  return Math.max(0,w);
}
function fmtMin(m) { if(m===null||m===undefined) return "－"; return Math.floor(m/60)+"h"+String(m%60).padStart(2,"0")+"m"; }
function fmtOT(m) { if(!m||m<=0) return "－"; return Math.floor(m/60)+":"+String(m%60).padStart(2,"0"); }
function fmtNow() { return new Date().toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"}); }
function calcOvertime(n) { if(n===null) return 0; return Math.max(0,n-480); }

function buildPeriodDays(py,pm) {
  var ny=pm===11?py+1:py, nm=pm===11?0:pm+1, list=[];
  for(var d=16;d<=getDim(py,pm);d++) list.push({y:py,m:pm,d:d});
  for(var d2=1;d2<=15;d2++) list.push({y:ny,m:nm,d:d2});
  return list;
}

function initWishes() {
  var data={};
  EMPLOYEES.forEach(function(e) {
    data[e.id]={};
    // 今月と来月分を初期化
    for(var mo=0;mo<=1;mo++){
      var y=MONTH+mo>11?YEAR+1:YEAR;
      var m=MONTH+mo>11?0:MONTH+mo;
      var key=y+"-"+m;
      data[e.id][key]={};
      for(var d=1;d<=getDim(y,m);d++) data[e.id][key][d]={shift:new Date(y,m,d).getDay()===0?"休み":"早番",note:""};
    }
  });
  return data;
}
function initShifts() {
  var data={};
  EMPLOYEES.forEach(function(e) {
    data[e.id]={};
    for(var d=1;d<=getDim(YEAR,MONTH);d++) data[e.id][d]=null;
  });
  return data;
}
function initAtt() {
  var data={};
  EMPLOYEES.forEach(function(e) {
    data[e.id]={};
    for(var d=1;d<=getDim(YEAR,MONTH);d++) {
      data[e.id][d]={in:null,out:null,bs:null,be:null,status:"",memo:""};
    }
  });
  return data;
}

function LiveClock(props) {
  var s=props.style||{fontFamily:"monospace",fontSize:12,color:C.dim};

}

function getLocation(cb) {
  if(!navigator.geolocation){cb("位置情報非対応");return;}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat=pos.coords.latitude,lng=pos.coords.longitude;
      fetch("https://nominatim.openstreetmap.org/reverse?format=json&lat="+lat+"&lon="+lng+"&accept-language=ja")
        .then(function(r){return r.json();})
        .then(function(d){var a=d.address||{};cb((a.city||a.town||a.village||"")+(a.suburb||a.neighbourhood||"")||"位置取得済");})
        .catch(function(){cb("緯度"+lat.toFixed(3)+" 経度"+lng.toFixed(3));});
    },
    function(){cb("位置情報拒否");}
  );
}

          Object.keys(window._empUUIDs||{}).forEach(function(k){
            if(window._empUUIDs[k]===row.employee_id) empId=parseInt(k);

          if(!empId){
            empId=row.employee_id;

          if(!next[empId]) return;
          var day=parseInt(row.date.split('-')[2]);
          next[empId]=Object.assign({},next[empId]);
          next[empId][day]={
            in:  row.time_in    ? {time:row.time_in,   loc:row.loc_in||'',edited:false,editLog:[]} : null,

  function downloadShiftExcel(){
    if(!window.XLSX){showToast("Excel機能を読み込み中...");return;}
    var wb=XLSX.utils.book_new();
    var totalDays=getDim(pdfY,pdfM);
    var dayArr2=Array.from({length:totalDays},function(_,i){return i+1;});

    // シート1: シフト表（日×スタッフ）
    var hdr=["日付","曜日"].concat(EMPLOYEES.map(function(e){return e.name;}));
    var dataRows=[];
    dayArr2.forEach(function(d){
      var row=[pdfM+1+"/"+d, getDayName(pdfY,pdfM,d)];
      EMPLOYEES.forEach(function(e){
        var isCur=pdfY===YEAR&&pdfM===MONTH;
        var sv=isCur?(shifts[e.id][d]||"休み"):"休み";
        row.push(sv);
      });
      dataRows.push(row);
    });

    var ws=XLSX.utils.aoa_to_sheet([hdr].concat(dataRows));
    var cols=[{wch:8},{wch:4}];
    EMPLOYEES.forEach(function(){cols.push({wch:8});});
    ws["!cols"]=cols;
    XLSX.utils.book_append_sheet(wb, ws, pdfY+"年"+String(pdfM+1)+"月シフト");
    XLSX.writeFile(wb, "帽子屋Flava_シフト表_"+pdfY+"年"+String(pdfM+1)+"月.xlsx");
    showToast("シフト表Excelをダウンロードしました 📊");
  }

  function PdfTab() {
    var DAY_NAMES=["土","日","月","火","水","木","金"];
    var totalDays=getDim(pdfY,pdfM);
    var firstSat=1;
    while(new Date(pdfY,pdfM,firstSat).getDay()!==6) firstSat++;
    var weeks=[];
    if(firstSat>1){
      var prevM=pdfM===0?11:pdfM-1,prevY=pdfM===0?pdfY-1:pdfY;
      var prevSat=getDim(prevY,prevM);
      while(new Date(prevY,prevM,prevSat).getDay()!==6) prevSat--;
      var fw=[{y:prevY,m:prevM,d:prevSat,prev:true}];
      for(var d=1;d<firstSat;d++) fw.push({y:pdfY,m:pdfM,d:d,prev:false});
      while(fw.length<7) fw.push(null);
      weeks.push(fw);
    }
    for(var start=firstSat;start<=totalDays;start+=7){
      var week=[];
      for(var i=0;i<7;i++){
        var day=start+i;
        if(day<=totalDays) week.push({y:pdfY,m:pdfM,d:day,prev:false});

  function downloadAllExcel(){
    if(!window.XLSX){showToast("Excel機能を読み込み中...");return;}
    var wb=XLSX.utils.book_new();
    EMPLOYEES.forEach(function(emp){
      var hdr=["日付","曜日","シフト","出勤","退勤","休憩","残業","状態","コメント"];
      var dataRows=[];
      periodDays.forEach(function(item){
        var isCur=item.y===YEAR&&item.m===MONTH;
        var sv=isCur?(shifts[emp.id][item.d]||"休み"):"休み";
        var rec=isCur?(att[emp.id][item.d]||{}):{};
        var net=calcNet(entryTime(rec.in),entryTime(rec.out),entryTime(rec.bs),entryTime(rec.be));
        var bt=isCur?rec.breakType:null;
        var breakDisp=(!isCur||!entryTime(rec.in))?"":bt==="0"?"なし":bt==="60"?"1:00":"0:45";
        var otMin=net?calcOvertime(net):0;
        dataRows.push([
          item.m+1+"/"+item.d,
          getDayName(item.y,item.m,item.d),
          sv,
          entryTime(rec.in)||"",
          entryTime(rec.out)||"",
          breakDisp,
          otMin>0?fmtOT(otMin):"",
          rec.status||"",
          rec.memo||""
        ]);
      });
      var ws=XLSX.utils.aoa_to_sheet([hdr].concat(dataRows));
      ws["!cols"]=[{wch:8},{wch:4},{wch:6},{wch:6},{wch:6},{wch:6},{wch:6},{wch:8},{wch:20}];
      XLSX.utils.book_append_sheet(wb, ws, emp.name);
    });
    XLSX.writeFile(wb, "帽子屋Flava_全員勤怠_"+pY+"年"+String(pM+1)+"月.xlsx");
    showToast("全員のExcelをダウンロードしました 📊");
  }

          <div key={r.emp.id} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:20,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14,borderBottom:"1px solid "+C.border,paddingBottom:12}}>

        <div style={{marginBottom:18}}>
          <div style={{fontWeight:800,fontSize:16,color:C.accent}}>{emp&&emp.name}</div>
          <div style={{fontSize:12,color:C.dim,marginTop:4,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>{MONTH+1}月{editAtt.day}日（{getDayName(YEAR,MONTH,editAtt.day)}）<ShiftBadge type={st} size={20}/><span style={{color:stDef.color,fontWeight:700}}>{st} {stDef.time}</span></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
          {[["出勤時刻","in"],["退勤時刻","out"],["休憩開始","bs"],["休憩終了","be"]].map(function(pair){return(<div key={pair[1]} style={{marginBottom:12}}><div style={{fontSize:10,color:C.dim,marginBottom:3,letterSpacing:1}}>{pair[0]}</div><input type="time" defaultValue={editForm[pair[1]]||""} onInput={function(e){var k=pair[1];setEditForm(function(p){var n=Object.assign({},p);n[k]=e.target.value;return n;});}} style={inputS}/></div>);})}
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:C.dim,marginBottom:6,letterSpacing:1}}>勤怠ステータス</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{STATUS_LIST.map(function(s){var active=(editForm.status||"")===s.key;return(<button key={s.key} onClick={function(){setEditForm(function(p){return Object.assign({},p,{status:s.key});});}} style={{padding:"5px 12px",borderRadius:20,border:"2px solid "+(active?s.border:C.border),background:active?s.border+"22":"transparent",color:active?s.color:C.dim,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:active?700:400}}>{s.label}</button>);})}</div>
        </div>
        <div style={{marginBottom:12}}><div style={{fontSize:10,color:C.dim,marginBottom:3,letterSpacing:1}}>コメント</div><textarea defaultValue={editForm.memo||""} rows={2} placeholder="遅刻理由・特記事項など" onInput={function(e){setEditForm(function(p){return Object.assign({},p,{memo:e.target.value});});}} style={{background:C.panel,border:"1px solid "+C.border,borderRadius:6,padding:"7px 10px",color:C.text,fontFamily:"inherit",fontSize:13,width:"100%",boxSizing:"border-box",resize:"vertical",lineHeight:1.6}}/></div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={saveAttEdit} style={{padding:"10px 0",width:"100%",borderRadius:8,border:"none",cursor:"pointer",background:C.accent,color:"#0D1117",fontFamily:"inherit",fontSize:14,fontWeight:800}}>保存する</button>
          <button onClick={function(){setEditAtt(null);}} style={{padding:"10px 0",width:"100%",borderRadius:8,border:"none",cursor:"pointer",background:C.border,color:C.text,fontFamily:"inherit",fontSize:14}}>キャンセル</button>
        </div>
      </div></>
    );
  }

  function EditRecModal() {
    if(!editRec) return null;
    var fieldLabels={in:"出勤",out:"退勤",bs:"休憩開始",be:"休憩終了"};
    var entry=att[editRec.empId][editRec.day][editRec.field];
    var log=entry?(entry.editLog||[]):[];
    return(
      <><div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",zIndex:99}} onClick={function(){setEditRec(null);}}/><div style={{position:"fixed",top:"50%",left:"50%",transform:"translate(-50%,-50%)",background:C.card,border:"1px solid "+C.orange+"55",borderRadius:14,padding:28,zIndex:100,width:320,maxWidth:"90vw"}}>
        <div style={{fontWeight:800,fontSize:15,color:C.orange,marginBottom:4}}>打刻修正 — {fieldLabels[editRec.field]}</div>
        <div style={{fontSize:11,color:C.dim,marginBottom:16}}>{(EMPLOYEES.find(function(e){return e.id===editRec.empId;})||{}).name} / {MONTH+1}月{editRec.day}日</div>
        {entry&&entry.loc&&<div style={{fontSize:11,color:C.dim,marginBottom:10,padding:"6px 10px",background:C.panel,borderRadius:6}}>📍 打刻時の位置: {entry.loc}</div>}
        <div style={{fontSize:10,color:C.dim,marginBottom:5,letterSpacing:1}}>修正後の時刻</div>
        <input type="time" defaultValue={editTime} onInput={function(e){setEditTime(e.target.value);}} style={{background:C.panel,border:"1px solid "+C.border,borderRadius:6,padding:"10px 14px",color:C.text,fontFamily:"inherit",fontSize:18,width:"100%",boxSizing:"border-box",marginBottom:16}}/>
        {log.length>0&&<div style={{background:C.panel,borderRadius:6,padding:"8px 10px",marginBottom:16}}><div style={{fontSize:9,color:C.dim,marginBottom:5,letterSpacing:1}}>修正履歴</div>{log.map(function(l,li){return <div key={li} style={{fontSize:10,color:C.orange,marginBottom:2}}>{l.before} → 修正（{l.at}）</div>;})}</div>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={saveEditRec} style={{flex:1,padding:"10px 0",borderRadius:8,border:"none",cursor:"pointer",background:C.orange,color:"#0D1117",fontFamily:"inherit",fontSize:14,fontWeight:800}}>修正を保存</button>
          <button onClick={function(){setEditRec(null);}} style={{flex:1,padding:"10px 0",borderRadius:8,border:"none",cursor:"pointer",background:C.border,color:C.text,fontFamily:"inherit",fontSize:14}}>キャンセル</button>
        </div>
      </div></>
    );
  }

  // ══════════════════════════════════════
  // ログインモーダル
  // ══════════════════════════════════════
  function LoginModal() {
    return(
      <PasswordModal
        show={showLogin}
        managerPw={MANAGER_PW}
        onSuccess={function(){setIsManager(true);setShowLogin(false);showToast("店長としてログインしました 👑");}}
        onClose={function(){setShowLogin(false);}}
      />
    );
  }

  // ══════════════════════════════════════
  // レンダー
  // ══════════════════════════════════════
  var currentTabs=isManager?staffTabs.concat(managerTabs):staffTabs;

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif",color:C.text}}>
      <style>{"button:hover{opacity:.82;} textarea{outline:none;} input{outline:none;}"}</style>

      <header style={{background:C.panel,borderBottom:"1px solid "+C.border,padding:"0 20px",height:58,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{display:"flex",alignItems:"baseline",gap:6}}>
            <span style={{fontSize:11,color:C.dim}}>🎩</span>
            <span style={{fontFamily:"Georgia,serif",fontWeight:700,fontSize:22,color:"#3D2B1F",letterSpacing:3}}>帽子屋 Flava</span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <LiveClock style={{fontFamily:"monospace",fontSize:12,color:C.dim,letterSpacing:1}}/>
          {isManager
            ?<button onClick={function(){setIsManager(false);setTab("punch");}} style={{padding:"4px 14px",borderRadius:20,border:"1px solid "+C.orange,background:C.orange+"22",color:C.orange,cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700}}>👑 店長 / ログアウト</button>
            :<button onClick={function(){setShowLogin(true);setPwInput("");setPwError(false);}} style={{padding:"4px 14px",borderRadius:20,border:"1px solid "+C.border,background:"transparent",color:C.dim,cursor:"pointer",fontFamily:"inherit",fontSize:11,fontWeight:700}}>🔐 店長ログイン</button>
          }
        </div>
      </header>

      <nav style={{display:"flex",background:C.panel,borderBottom:"1px solid "+C.border,padding:"0 16px",overflowX:"auto"}}>
        {currentTabs.map(function(n){
          var active=tab===n.key;
          var isManagerTab=managerTabs.some(function(m){return m.key===n.key;});
          var color=isManagerTab?C.orange:C.accent;
          var unreadCount=n.badge?notifications.filter(function(x){return !x.read;}).length:0;
          return(
            <button key={n.key} onClick={function(){setTab(n.key);}} style={{padding:"12px 16px",border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:active?700:500,color:active?color:C.dim,borderBottom:active?"2px solid "+color:"2px solid transparent",background:"none",whiteSpace:"nowrap",position:"relative"}}>
              {n.label}
              {unreadCount>0&&<span style={{position:"absolute",top:6,right:2,background:C.orange,color:"#0D1117",borderRadius:"50%",width:16,height:16,fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{unreadCount}</span>}
            </button>
          );
        })}
      </nav>

      <div style={{padding:"20px",maxWidth:900,margin:"0 auto"}}>
        {tab==="punch"  && <PunchTab/>}
        {tab==="all"    && <AllTab/>}
        {tab==="wish"   && <WishTab/>}
        {tab==="mysum"  && <MySummaryTab/>}
        {tab==="shift"  && isManager && <ShiftTab/>}
        {tab==="pdf"    && isManager && <PdfTab/>}
        {tab==="attend" && isManager && <AttendTab/>}
        {tab==="allsum" && isManager && <AllSummaryTab/>}
      </div>

      <ShiftPopover/>
      <AttModal/>
      <EditRecModal/>
      <LoginModal/>
      {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:C.accent,color:"#0D1117",padding:"10px 26px",borderRadius:40,fontSize:12,fontWeight:700,zIndex:200,whiteSpace:"nowrap",maxWidth:"90vw",textAlign:"center"}}>{toast}</div>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
